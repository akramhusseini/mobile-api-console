<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mobile API Console</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      width: 320px;
      margin: 0;
      font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      color: #1a1d21;
      background: #fff;
    }
    @media (prefers-color-scheme: dark) {
      body { color: #e8eaed; background: #1f2227; }
      .site { background: #15181c; border-color: #2a2f36; }
      button.secondary { color: #9aa4b2; }
    }
    .wrap { padding: 14px; }
    h1 { font-size: 13px; margin: 0 0 2px; letter-spacing: .01em; }
    .sub { font-size: 11px; opacity: .6; margin: 0 0 12px; }
    .site {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      word-break: break-all;
      background: #f4f6f8;
      border: 1px solid #e3e7ec;
      border-radius: 7px;
      padding: 8px 10px;
      margin: 0 0 12px;
    }
    button {
      font: inherit;
      cursor: pointer;
      border-radius: 7px;
      padding: 8px 12px;
      border: 1px solid transparent;
    }
    button.primary {
      width: 100%;
      background: #2f6df6;
      color: #fff;
      font-weight: 600;
    }
    button.primary:disabled { opacity: .5; cursor: default; }
    button.secondary {
      background: transparent;
      color: #5b6573;
      border: none;
      padding: 6px 0 0;
      font-size: 11px;
      text-decoration: underline;
    }
    .status { font-size: 11px; margin-top: 10px; min-height: 14px; }
    .status.ok { color: #1f9d57; }
    .status.err { color: #d3454b; }
    .status.muted { opacity: .6; }
    .suggest { margin-top: 12px; border-top: 1px solid rgba(127,127,127,.25); padding-top: 10px; }
    .suggest-label { font-size: 11px; opacity: .65; margin-bottom: 6px; }
    .suggest-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .suggest-host {
      flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px;
    }
    .suggest-row button {
      background: transparent; border: 1px solid #2f6df6; color: #2f6df6;
      padding: 3px 9px; font-size: 11px; font-weight: 600; white-space: nowrap;
    }
    .badge {
      display: inline-block; font-size: 10px; font-weight: 600;
      padding: 1px 6px; border-radius: 999px; margin-left: 6px;
      background: #e6f4ec; color: #1f9d57;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Mobile API Console<span id="capturingBadge" class="badge" hidden>capturing</span></h1>
    <p class="sub">Capture this tab's API traffic — no URLs to type.</p>
    <div id="site" class="site">…</div>
    <button id="capture" class="primary" type="button" disabled>Capture this site</button>
    <div id="status" class="status muted"></div>
    <div id="apiSuggest" class="suggest" hidden>
      <div class="suggest-label">API hosts seen — also capture their response headers:</div>
      <div id="apiSuggestList"></div>
    </div>
    <button id="openOptions" class="secondary" type="button">Advanced settings…</button>
  </div>
  <script src="options-helper.js"></script>
  <script src="popup.js"></script>
</body>
</html>
