<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mobile API Console</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="title-block">
          <h1>Mobile API Console</h1>
          <div class="source-line">
            <span id="sourceDot" class="status-dot"></span>
            <span id="sourceText">Connecting...</span>
          </div>
        </div>
        <div class="top-actions">
          <button id="toggleListButton" class="icon-button" type="button" title="Hide call list" aria-label="Hide call list" aria-pressed="false">‹ Hide list</button>
          <label class="source-picker-label" for="sourcePicker">Source</label>
          <select id="sourcePicker" class="select-input source-picker" aria-label="Log source"></select>
          <button id="restartButton" class="icon-button" title="Restart stream" aria-label="Restart stream">Restart</button>
          <button id="clearButton" class="danger-button" title="Clear visible API calls" aria-label="Clear visible API calls">Clear</button>
        </div>
      </header>

      <section class="toolbar" aria-label="Filters">
        <select id="sessionPicker" class="select-input session-picker" aria-label="Active session"></select>
        <input id="searchInput" class="search-input" type="search" placeholder="Search URL, status, headers, body">
        <select id="stateFilter" class="select-input" aria-label="Status filter">
          <option value="all">All states</option>
          <option value="error">Errors</option>
          <option value="pending">Pending</option>
          <option value="success">Success</option>
        </select>
        <select id="methodFilter" class="select-input" aria-label="Method filter">
          <option value="all">All methods</option>
        </select>
        <label class="toggle">
          <input id="autoSelectToggle" type="checkbox" checked>
          <span>Follow latest</span>
        </label>
      </section>

      <main id="workspace" class="workspace">
        <aside class="request-list">
          <div class="list-meta">
            <span id="countText">0 calls</span>
            <span id="lastUpdateText">Waiting</span>
          </div>
          <div id="requestList" class="request-items"></div>
        </aside>

        <div id="paneDivider" class="pane-divider" role="separator" aria-orientation="vertical" aria-label="Resize panes" aria-valuemin="0" aria-valuemax="100" aria-valuenow="38" tabindex="0"></div>

        <section class="detail-pane">
          <div id="emptyState" class="empty-state">
            <h2>No API calls yet</h2>
            <p id="emptyStateHint">Run the iOS app in a booted simulator and trigger an API request.</p>
          </div>

          <article id="detailContent" class="detail-content hidden">
            <div class="detail-header">
              <div class="detail-summary">
                <div class="detail-kicker" id="detailHost"></div>
                <div class="detail-title-wrap">
                  <h2 id="detailTitle"></h2>
                  <button id="detailTitleCopy" class="copy-url-popup" type="button" hidden>Copy URL</button>
                </div>
                <div class="detail-meta">
                  <span class="meta-chip meta-chip--url" id="detailUrl" title="Full URL"></span>
                  <span class="meta-chip" id="detailSize" hidden></span>
                </div>
              </div>
              <div class="detail-badges">
                <span id="detailMethod" class="method-badge"></span>
                <span id="detailStatus" class="status-badge"></span>
              </div>
            </div>

            <div class="tabbar-row">
              <div class="tabbar" role="tablist" aria-label="Details">
                <button class="tab-button active" data-tab="preview" role="tab">Preview</button>
                <button class="tab-button" data-tab="headers" role="tab">Headers</button>
                <button class="tab-button" data-tab="payload" role="tab">Payload</button>
                <button class="tab-button" data-tab="response" role="tab">Response</button>
                <button class="tab-button" data-tab="curl" role="tab">cURL</button>
                <button class="tab-button" data-tab="errors" role="tab">Errors</button>
                <button class="tab-button" data-tab="raw" role="tab">Raw</button>
              </div>
              <button id="copyButton" class="copy-button" title="Copy current tab" aria-label="Copy current tab">Copy</button>
            </div>

            <div id="detailBody" class="detail-body"></div>
          </article>
        </section>
      </main>
    </div>

    <script src="/jsonTree.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
